name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install uv
          uv venv
          uv pip install -e ".[dev]"
      - name: Lint
        run: |
          uv run ruff check --no-fix scripts/ tests/ hooks/
          uv run ruff format --check scripts/ tests/ hooks/
      - name: Run tests
        run: uv run pytest tests/ -v
